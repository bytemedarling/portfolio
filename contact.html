    <header class="header">
       <div>
            <a href="index.html">
                <img src="images/rectanglelogo.png" alt="site-logo" class="logo">
            </a>
        </div>
        

    <!-- Hamburger Button -->
        <div class="menu-wrapper">
            <button class="menu-button" id="menuButton">☰</button>

    <!-- Navigation Menu (hidden until toggled) -->

        </nav>

     <!----------- Contact Section ----------->
    <section id="contact-wrapper" class="contact-wrapper">
        <div class="contact-info"> <!-- Added wrapper for better styling -->
            <h2>Jessica Kostyk</h2>
            <p>You can reach me at:</p>
            <ul>
                <li>Email: jessicakostyk@outlook.com</li>
                <li><a href="https://www.linkedin.com/in/jessica-k-240017113/">LinkedIn</a></li>
                <li><a href="https://github.com/bytemedarling">GitHub</a></li>
            </ul>
        </div>

    <!---------- Form Section ---------->
        <div class="contact-form"> <!-- Added wrapper for better styling -->
            <h2>Send Me A Message</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send</button>
        </div>
        </form>
    </section>
